#cloud-config
package_update: true
package_upgrade: true

packages:
  - build-essential
  - git
  - curl
  - wget
  - htop
  - tmux
  - nvtop
  - python3-pip
  - python3-venv
  - dkms

runcmd:
  - apt-get install -y linux-headers-$(uname -r) build-essential dkms
  - apt-get purge -y '*nvidia*' || true
  - apt-get autoremove -y
  - apt-get install -y nvidia-driver-595-open
  - git clone ${repo_url} /root/vllm-speculative-demo

  # Make SSH sessions land in the project directory
  - echo 'cd /root/vllm-speculative-demo' >> /root/.bashrc

  # Auto-activate venv after start-demo.sh creates it
  - echo 'if [ -f /root/vllm-speculative-demo/.venv/bin/activate ]; then source /root/vllm-speculative-demo/.venv/bin/activate; fi' >> /root/.bashrc

  - echo "Setup complete. Rebooting for NVIDIA driver." | tee /root/cloud-init-vllm.log

power_state:
  mode: reboot